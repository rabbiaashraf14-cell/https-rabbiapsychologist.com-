<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Background gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DCEEFF"/> <!-- Soft Sky Blue -->
      <stop offset="100%" stop-color="#FFF8EF"/> <!-- Warm Cream -->
    </linearGradient>
  </defs>

  <!-- Care Arc (Open Book / Hands) -->
  <path d="M 20 85 C 40 100, 60 90, 60 70 C 60 90, 80 100, 100 85" fill="none" stroke="#4B8BBE" stroke-width="6" stroke-linecap="round" />

  <!-- Monogram R A -->
  <!-- R -->
  <path d="M 45 40 L 45 75 M 45 40 C 60 40, 60 55, 45 55 L 58 75" fill="none" stroke="#0F2742" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />
  <!-- A -->
  <path d="M 75 75 L 65 40 L 55 75 M 58 60 L 72 60" fill="none" stroke="#0F2742" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Child-development dot -->
  <circle cx="60" cy="25" r="8" fill="#8BBF9F" /> <!-- Growth Green -->

  <!-- Gentle growth curve / leaf -->
  <path d="M 70 30 C 85 20, 95 35, 80 45" fill="#EEE9FF" opacity="0.8" /> <!-- Soft Lavender -->

</svg>
